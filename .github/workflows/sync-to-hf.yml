name: Sync Backend to Hugging Face Space
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Push backend to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global credential.helper store
          echo "https://chandratej1947:$HF_TOKEN@huggingface.co" > ~/.git-credentials
          
          # Clone the empty HF space
          git clone https://huggingface.co/spaces/chandratej1947/ai-resume-screener hf_space
          
          # Copy all backend files into the space
          cp -r backend/* hf_space/
          
          # Push to HuggingFace
          cd hf_space
          git config user.email "bot@github.com"
          git config user.name "Sync Bot"
          git add .
          git commit -m "Sync backend from GitHub" || echo "No changes to commit"
          git push
